<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        width: 100%;
        height: 100%; /* Fill the whole system window */
        overflow: hidden !important;
        user-select: none;
      }
      #notification-root {
        margin: 0;
        padding: 0;
        background: transparent;
        width: 100%;
        height: 100%; 
        display: flex;
        flex-direction: column;
        justify-content: flex-end; /* Anchor content to the bottom of the window */
        visibility: collapse; /* Hide the container and all children by default */
        pointer-events: none; /* Make clicks pass through by default */
      }
    </style>
  </head>
  <body>
    <div id="notification-root"></div>
    <script type="module" src="/src/notification.tsx"></script>
  </body>
</html>
