<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: transparent !important;
        width: 100%;
        height: auto; /* Allow natural height */
        min-height: 0;
        overflow: hidden !important;
        user-select: none;
      }
      #notification-root {
        margin: 0;
        padding: 0;
        background: transparent;
        width: 100%;
        height: auto; 
        display: flex;
        flex-direction: column;
        justify-content: flex-start; /* Start from top, window will be sized to fit */
        visibility: visible; 
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="notification-root"></div>
    <script type="module" src="/src/notification.tsx"></script>
  </body>
</html>
